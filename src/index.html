<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="window-border"></div>
    <div id="app-wrapper">
        <div id="title-bar">
            <div id="WindowTitle">MFExplorer</div>
                <div id="window-controls">
                    <div class="button" id="Minimize">—</div>
                    <div class="button" id="Maximize">☐</div>
                    <div class="button" id="Close">✕</div>
                </div>
            </div>
        <div id="top-bar">
            <button id="back-button">◀</button>
            <button id="forward-button">▶</button>
            <button id="refresh-button"><span class="reload-icon">&#x21bb;</span></button>
            <input type="text" placeholder="Directory" id="address-bar">
            <button id="menu-button">☰</button>
        </div>
        <div id="app-content">
            <div id="file-list">
                <div id="items">
                    <div class="file-item">                     <!-- Dummy items for testing and modifying the HTML/CSS design from a live server -->
                        <span class="item-name">📁 Users</span> <!-- They get deleted anyways when loading the initial directory -->
                        <span class="item-size"></span>
                    </div> 
                    <div class="file-item">
                        <span class="item-name">📁 Program Files</span> 
                        <span class="item-size"></span>
                    </div> 
                    <div class="file-item">
                        <span class="item-name">📁 Windows</span>
                        <span class="item-size"></span>
                    </div>
                    <div class="file-item">
                        <span class="item-name">📄 README.txt</span>
                        <span class="item-size">5 MB</span>
                    </div>
                    <div class="file-item">
                        <span class="item-name">📄 notes.md</span>
                        <span class="item-size">5 MB</span>
                    </div>
                    <div class="file-item">
                        <span class="item-name">📄 mfexplorer.exe</span>
                        <span class="item-size">5 MB</span>
                    </div>
                </div>
            </div>
        </div>
        <div id="context-menu">
            <h2>Options:</h2>
            <hr>
            <div class="context-menu-option">
                <span class="text">Open</span>
            </div>
            <div class="context-menu-option">
                <span class="text">Rename</span>
            </div>
            <div class="context-menu-option">
                <span class="text">Delete</span>
            </div>
        </div>
        <div id="tooltip"></div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
