<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="window-border"></div>
    <div id="app-wrapper">
        <div id="title-bar">
            <div id="WindowTitle">MFExplorer</div>
                <div id="window-controls">
                    <div class="button" id="Minimize">—</div>
                    <div class="button" id="Maximize">☐</div>
                    <div class="button" id="Close">✕</div>
                </div>
            </div>
        <div id="top-bar">
            <button id="back-button">◀</button>
            <button id="forward-button">▶</button>
            <input type="text" placeholder="Directory" id="address-bar">
            <button id="menu-button">☰</button>
        </div>
        <div id="app-content">
            <div id="file-list">
                <div class="file-item">📁 Users</div> <!-- Dummy items for testing and modifying the HTML/CSS design from a live server -->
                <div class="file-item">📁 Program Files</div> <!-- They get deleted anyways when loading the initial directory -->
                <div class="file-item">📁 Windows</div>

                <div class="file-item">📄 README.txt</div>
                <div class="file-item">📄 notes.md</div>
                <div class="file-item">📄 mfexplorer.exe</div>
            </div>
        </div>
    </div>
</body>

</html>
<script src="renderer.js"></script>
